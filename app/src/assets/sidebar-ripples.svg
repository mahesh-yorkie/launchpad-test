<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1200" viewBox="0 0 800 1200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <radialGradient id="g" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="hsl(200, 45%, 32%)" />
      <stop offset="100%" stop-color="hsl(220, 50%, 8%)" />
    </radialGradient>
    <filter id="n" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" seed="4" result="t" />
      <feColorMatrix in="t" type="saturate" values="0" result="g" />
      <feComponentTransfer in="g" result="a">
        <feFuncA type="linear" slope="0.22" />
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="a" mode="overlay" />
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#g)" filter="url(#n)" />
  <g opacity="0.18" fill="none" stroke="hsl(200, 40%, 60%)" stroke-width="1.2">
    <ellipse cx="120" cy="200" rx="180" ry="50" transform="rotate(-6 120 200)" />
    <ellipse cx="500" cy="360" rx="220" ry="64" transform="rotate(3 500 360)" />
    <ellipse cx="200" cy="700" rx="240" ry="70" transform="rotate(-2 200 700)" />
    <ellipse cx="600" cy="900" rx="200" ry="55" transform="rotate(4 600 900)" />
  </g>
</svg>
