<svg width="800" height="1200" viewBox="0 0 800 1200" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <linearGradient id="poolDeep" x1="400" y1="0" x2="400" y2="1200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#003E46"/>
      <stop offset="0.5" stop-color="#0A4F5A"/>
      <stop offset="1" stop-color="#0B2F36"/>
    </linearGradient>
    <radialGradient id="lightRipple" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(200 200) rotate(50) scale(800 1000)">
      <stop stop-color="white" stop-opacity="0.22"/>
